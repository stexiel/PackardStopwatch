workflows:
  ios-workflow:
    name: iOS Packard Stopwatch
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      vars:
        BUNDLE_ID: "com.packard.stopwatch"
        APP_NAME: "Packard Stopwatch"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Create iOS project structure
        script: |
          # Создаем iOS проект если его нет
          if [ ! -d "ios" ]; then
            flutter create --platforms=ios .
          fi
      - name: Configure iOS project
        script: |
          # Обновляем Bundle ID
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $APP_NAME" ios/Runner/Info.plist
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Build iOS app
        script: |
          flutter build ios --release --no-codesign
      - name: Create IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r packard_stopwatch.ipa Payload
    artifacts:
      - build/ios/iphoneos/*.ipa
      - build/ios/iphoneos/Runner.app
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
