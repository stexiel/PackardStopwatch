workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.packard.packardStopwatch"
    scripts:
      - name: Получение зависимостей Flutter
        script: |
          flutter pub get
      - name: Отключение code signing после обновления Flutter
        script: |
          echo "Отключаем code signing в project.pbxproj"
          # Заменяем все CODE_SIGN_IDENTITY на пустые строки
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer";/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "";/g' ios/Runner.xcodeproj/project.pbxproj
          echo "Code signing отключен"
      - name: Установка CocoaPods
        script: |
          cd ios
          pod install
          cd ..
      - name: Сборка iOS без подписи
        script: |
          flutter build ios --release --no-codesign
      - name: Создание unsigned IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../PackardStopwatch-unsigned.ipa Payload
          cd ../../..
          ls -lh PackardStopwatch-unsigned.ipa
    artifacts:
      - PackardStopwatch-unsigned.ipa
