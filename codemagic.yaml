workflows:
  ios-workflow:
    name: iOS Packard Stopwatch
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      vars:
        BUNDLE_ID: "com.packard.stopwatch"
        APP_NAME: "Packard Stopwatch"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Create iOS project structure
        script: |
          # Показываем текущую директорию
          pwd
          ls -la
          # Удаляем старую iOS структуру если есть
          rm -rf ios android
          # Создаем новый Flutter проект с iOS поддержкой
          flutter create --org com.packard --platforms=ios --project-name packard_stopwatch . --verbose
          # Проверяем что iOS проект создан
          echo "=== Checking iOS directory ==="
          ls -la ios/ || echo "iOS directory not found!"
          echo "=== Checking xcodeproj ==="
          ls -la ios/Runner.xcodeproj/ || echo "xcodeproj not found!"
          # Если не создался, пробуем альтернативный метод
          if [ ! -d "ios/Runner.xcodeproj" ]; then
            echo "=== Trying alternative method ==="
            flutter create --platforms=ios .
          fi
      - name: Configure iOS project
        script: |
          # Обновляем Bundle ID и название приложения
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $APP_NAME" ios/Runner/Info.plist
          # Добавляем поддержку всех ориентаций
          /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool false" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIStatusBarHidden bool true" ios/Runner/Info.plist || true
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Build iOS app
        script: |
          flutter build ios --release --no-codesign
      - name: Create IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r packard_stopwatch.ipa Payload
    artifacts:
      - build/ios/iphoneos/*.ipa
      - build/ios/iphoneos/Runner.app
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
