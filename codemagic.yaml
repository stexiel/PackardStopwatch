workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.packard.packardStopwatch"
    scripts:
      - name: Установка сертификата для unsigned build
        script: |
          echo "Настройка для unsigned сборки"
          # Отключаем автоматическое управление подписью
          /usr/libexec/PlistBuddy -c "Set :objects:97C146E61CF9000F007C117D:attributes:TargetAttributes:97C146ED1CF9000F007C117D:ProvisioningStyle Manual" ios/Runner.xcodeproj/project.pbxproj || true
      - name: Получение зависимостей Flutter
        script: |
          flutter pub get
      - name: Установка CocoaPods
        script: |
          cd ios
          pod install
          cd ..
      - name: Сборка iOS без подписи
        script: |
          flutter build ios --release --no-codesign
      - name: Создание unsigned IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../PackardStopwatch-unsigned.ipa Payload
          cd ../../..
          ls -lh PackardStopwatch-unsigned.ipa
    artifacts:
      - PackardStopwatch-unsigned.ipa
