workflows:
  ios-workflow:
    name: iOS Packard Stopwatch
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      vars:
        BUNDLE_ID: "com.packard.stopwatch"
        APP_NAME: "Packard Stopwatch"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Verify iOS project structure
        script: |
          echo "=== Checking iOS project ==="
          ls -la ios/
          ls -la ios/Runner.xcodeproj/
          ls -la ios/Runner.xcodeproj/xcshareddata/xcschemes/
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Build iOS app
        script: |
          flutter build ios --release --no-codesign
      - name: Create IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r packard_stopwatch.ipa Payload
    artifacts:
      - build/ios/iphoneos/*.ipa
      - build/ios/iphoneos/Runner.app
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
