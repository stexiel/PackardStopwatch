name: Flutter iOS Build with Live Activity

on:
  push:
    branches: [ live-activity-feature ]
  pull_request:
    branches: [ live-activity-feature ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
    
    - name: Flutter doctor
      run: flutter doctor -v
    
    - name: Install Flutter dependencies
      run: flutter pub get
    
    - name: Install CocoaPods
      run: |
        cd ios
        pod install
        cd ..
    
    - name: Build iOS app without code signing
      run: |
        flutter build ios --release --no-codesign
    
    - name: Create unsigned IPA
      run: |
        cd build/ios/iphoneos
        mkdir -p Payload
        cp -r Runner.app Payload/
        zip -r ../../../PackardStopwatch.ipa Payload
        cd ../../..
        ls -lh PackardStopwatch.ipa
    
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: PackardStopwatch-iOS-LiveActivity
        path: PackardStopwatch.ipa
        retention-days: 30
