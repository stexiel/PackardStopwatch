name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Install CocoaPods
      run: |
        cd ios
        pod install
    
    - name: Build iOS app
      run: flutter build ios --release --no-codesign
    
    - name: Create IPA file
      run: |
        cd build/ios/iphoneos
        mkdir -p Payload
        cp -r Runner.app Payload/
        zip -r PackardStopwatch.ipa Payload
        ls -lh PackardStopwatch.ipa
    
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: PackardStopwatch-IPA
        path: build/ios/iphoneos/PackardStopwatch.ipa
        retention-days: 30
