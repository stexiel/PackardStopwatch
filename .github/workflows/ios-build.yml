name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout код
      uses: actions/checkout@v4
    
    - name: Установка Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        channel: 'stable'
    
    - name: Проверка версии Flutter
      run: flutter --version
    
    - name: Получение зависимостей
      run: flutter pub get
    
    - name: Отключение автоматического управления подписью
      run: |
        # Отключаем автоматическое управление подписью в Xcode проекте
        sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj || true
        sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj || true
        sed -i '' 's/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = "";/g' ios/Runner.xcodeproj/project.pbxproj || true
        sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj || true
    
    - name: Установка CocoaPods
      run: |
        cd ios
        pod install
        cd ..
    
    - name: Сборка iOS приложения без подписи
      run: |
        flutter build ios --release --no-codesign || flutter build ios --debug --no-codesign
    
    - name: Создание unsigned IPA
      run: |
        cd build/ios/iphoneos
        mkdir -p Payload
        cp -r Runner.app Payload/
        zip -r PackardStopwatch-unsigned.ipa Payload
        mv PackardStopwatch-unsigned.ipa ../../../
        cd ../../..
        ls -lh PackardStopwatch-unsigned.ipa
    
    - name: Загрузка IPA как артефакт
      uses: actions/upload-artifact@v4
      with:
        name: PackardStopwatch-iOS
        path: PackardStopwatch-unsigned.ipa
        retention-days: 30
