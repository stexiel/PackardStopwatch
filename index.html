<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
    <meta name="theme-color" content="#1a1a1a">
    <title>Packard Stopwatch</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        body.running {
            background: linear-gradient(135deg, #1a3a1a 0%, #2d4d2d 100%);
        }

        body.paused {
            background: linear-gradient(135deg, #3a1a1a 0%, #4d2d2d 100%);
        }

        #time {
            font-size: 15vw;
            font-weight: 200;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transition: color 0.3s ease;
        }

        body.running #time {
            color: #4ade80;
        }

        body.paused #time {
            color: #f87171;
        }

        #milliseconds {
            font-size: 8vw;
            opacity: 0.6;
            margin-left: 0.2em;
        }

        #status {
            position: absolute;
            top: 20px;
            font-size: 14px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
        }

        #pipButton {
            position: absolute;
            top: 70px;
            right: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #pipButton:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.25);
        }

        #pipButton.active {
            background: rgba(74, 222, 128, 0.3);
            border-color: #4ade80;
        }

        .install-prompt {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .install-prompt.show {
            transform: translateY(0);
        }

        .install-btn {
            background: #4ade80;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            margin: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .install-btn:active {
            transform: scale(0.95);
        }

        .install-btn.secondary {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        #pipCanvas {
            display: none;
        }

        .hint {
            position: absolute;
            bottom: 30px;
            font-size: 12px;
            opacity: 0.5;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="status">Нажмите для старта</div>
    <button id="pipButton">📌 Поверх приложений</button>
    
    <div id="time">
        <span id="minutes">00</span>:<span id="seconds">00</span><span id="milliseconds">.00</span>
    </div>

    <div class="hint">
        Тап - старт/пауза • Двойной тап - сброс
    </div>

    <canvas id="pipCanvas" width="400" height="200"></canvas>

    <div class="install-prompt" id="installPrompt">
        <p style="margin-bottom: 10px; font-size: 16px;">📱 Установить Packard Stopwatch?</p>
        <button class="install-btn" id="installBtn">Установить</button>
        <button class="install-btn secondary" id="dismissBtn">Позже</button>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        let lastTap = 0;
        let pipWindow = null;
        let pipActive = false;

        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');
        const millisecondsEl = document.getElementById('milliseconds');
        const statusEl = document.getElementById('status');
        const pipButton = document.getElementById('pipButton');
        const canvas = document.getElementById('pipCanvas');
        const ctx = canvas.getContext('2d');

        function updateDisplay() {
            const totalMs = Date.now() - startTime + elapsedTime;
            const minutes = Math.floor(totalMs / 60000);
            const seconds = Math.floor((totalMs % 60000) / 1000);
            const ms = Math.floor((totalMs % 1000) / 10);

            minutesEl.textContent = String(minutes).padStart(2, '0');
            secondsEl.textContent = String(seconds).padStart(2, '0');
            millisecondsEl.textContent = '.' + String(ms).padStart(2, '0');

            if (pipActive) {
                drawPiPCanvas(minutes, seconds, ms);
            }
        }

        function drawPiPCanvas(minutes, seconds, ms) {
            ctx.fillStyle = isRunning ? '#1a3a1a' : '#3a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = isRunning ? '#4ade80' : '#f87171';
            ctx.font = 'bold 80px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const timeText = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            ctx.fillText(timeText, canvas.width / 2, canvas.height / 2 - 20);

            ctx.font = '40px -apple-system, sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.fillText(`.${String(ms).padStart(2, '0')}`, canvas.width / 2, canvas.height / 2 + 40);
        }

        async function togglePiP() {
            try {
                if (pipWindow) {
                    await document.exitPictureInPicture();
                    pipWindow = null;
                    pipActive = false;
                    pipButton.classList.remove('active');
                    pipButton.textContent = '📌 Поверх приложений';
                } else {
                    drawPiPCanvas(0, 0, 0);
                    const videoStream = canvas.captureStream(30);
                    const video = document.createElement('video');
                    video.srcObject = videoStream;
                    video.muted = true;
                    await video.play();
                    
                    pipWindow = await video.requestPictureInPicture();
                    pipActive = true;
                    pipButton.classList.add('active');
                    pipButton.textContent = '✓ Активно';

                    pipWindow.addEventListener('resize', () => {
                        drawPiPCanvas(
                            Math.floor(elapsedTime / 60000),
                            Math.floor((elapsedTime % 60000) / 1000),
                            Math.floor((elapsedTime % 1000) / 10)
                        );
                    });
                }
            } catch (error) {
                console.error('PiP error:', error);
                alert('Picture-in-Picture не поддерживается в этом браузере');
            }
        }

        pipButton.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePiP();
        });

        function start() {
            if (!isRunning) {
                startTime = Date.now();
                timerInterval = setInterval(updateDisplay, 10);
                isRunning = true;
                statusEl.textContent = 'Идет';
                document.body.classList.add('running');
                document.body.classList.remove('paused');
            }
        }

        function pause() {
            if (isRunning) {
                clearInterval(timerInterval);
                elapsedTime += Date.now() - startTime;
                isRunning = false;
                statusEl.textContent = 'Пауза';
                document.body.classList.add('paused');
                document.body.classList.remove('running');
            }
        }

        function reset() {
            clearInterval(timerInterval);
            startTime = 0;
            elapsedTime = 0;
            isRunning = false;
            minutesEl.textContent = '00';
            secondsEl.textContent = '00';
            millisecondsEl.textContent = '.00';
            statusEl.textContent = 'Нажмите для старта';
            document.body.classList.remove('running', 'paused');
            if (pipActive) {
                drawPiPCanvas(0, 0, 0);
            }
        }

        document.body.addEventListener('click', (e) => {
            if (e.target === pipButton) return;
            
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;

            if (tapLength < 300 && tapLength > 0) {
                reset();
            } else {
                if (isRunning) {
                    pause();
                } else {
                    start();
                }
            }

            lastTap = currentTime;
        });

        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installBtn = document.getElementById('installBtn');
        const dismissBtn = document.getElementById('dismissBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            setTimeout(() => {
                installPrompt.classList.add('show');
            }, 2000);
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
            }
            installPrompt.classList.remove('show');
        });

        dismissBtn.addEventListener('click', () => {
            installPrompt.classList.remove('show');
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        document.addEventListener('leavepictureinpicture', () => {
            pipWindow = null;
            pipActive = false;
            pipButton.classList.remove('active');
            pipButton.textContent = '📌 Поверх приложений';
        });
    </script>
</body>
</html>
