<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packard Stopwatch - Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .time {
            font-size: 72px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            transition: color 0.3s ease;
        }
        
        .time.running {
            color: #00ff00;
        }
        
        .time.stopped {
            color: #ff0000;
        }
        
        .hint {
            margin-top: 40px;
            font-size: 16px;
            color: #666;
            text-align: center;
            line-height: 24px;
        }
        
        .pip-button {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        
        .pip-button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }
        
        .pip-button:active {
            transform: scale(0.95);
        }
        
        .pip-canvas {
            position: fixed;
            top: -9999px;
            left: -9999px;
        }
        
        @media (max-width: 768px) {
            .time {
                font-size: 48px;
            }
            .hint {
                font-size: 14px;
            }
            .pip-button {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="time stopped" id="time">00:00.00</div>
        <div class="hint">
            Tap - Start/Pause<br>
            Double Tap - Reset
        </div>
    </div>
    
    <button class="pip-button" id="pipButton">📌 Поверх окон</button>
    <canvas class="pip-canvas" id="pipCanvas" width="400" height="300"></canvas>

    <script>
        let milliseconds = 0;
        let isRunning = false;
        let interval = null;
        let lastTapTime = 0;
        let tapTimeout = null;
        let pipWindow = null;
        let animationId = null;

        const timeDisplay = document.getElementById('time');
        const container = document.getElementById('container');
        const pipButton = document.getElementById('pipButton');
        const canvas = document.getElementById('pipCanvas');
        const ctx = canvas.getContext('2d');

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const centiseconds = Math.floor((ms % 1000) / 10);
            
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(centiseconds).padStart(2, '0')}`;
        }

        function updateDisplay() {
            timeDisplay.textContent = formatTime(milliseconds);
        }

        function startStop() {
            if (isRunning) {
                clearInterval(interval);
                isRunning = false;
                timeDisplay.classList.remove('running');
                timeDisplay.classList.add('stopped');
            } else {
                isRunning = true;
                timeDisplay.classList.remove('stopped');
                timeDisplay.classList.add('running');
                interval = setInterval(() => {
                    milliseconds += 10;
                    updateDisplay();
                }, 10);
            }
        }

        function reset() {
            clearInterval(interval);
            milliseconds = 0;
            isRunning = false;
            timeDisplay.classList.remove('running');
            timeDisplay.classList.add('stopped');
            updateDisplay();
        }

        container.addEventListener('click', (e) => {
            const now = Date.now();
            
            if (now - lastTapTime < 300) {
                clearTimeout(tapTimeout);
                reset();
                lastTapTime = 0;
            } else {
                lastTapTime = now;
                tapTimeout = setTimeout(() => {
                    startStop();
                }, 300);
            }
        });

        // Prevent text selection on double click
        container.addEventListener('selectstart', (e) => {
            e.preventDefault();
        });

        // Picture-in-Picture функционал
        function drawStopwatch() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const timeText = formatTime(milliseconds);
            const color = isRunning ? '#00ff00' : '#ff0000';
            
            ctx.font = 'bold 60px "Courier New", monospace';
            ctx.fillStyle = color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(timeText, canvas.width / 2, canvas.height / 2 - 20);
            
            ctx.font = '16px Arial';
            ctx.fillStyle = '#666666';
            ctx.fillText('Tap - Start/Pause', canvas.width / 2, canvas.height / 2 + 40);
            ctx.fillText('Double Tap - Reset', canvas.width / 2, canvas.height / 2 + 65);
            
            if (pipWindow) {
                animationId = requestAnimationFrame(drawStopwatch);
            }
        }

        async function togglePiP() {
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                    pipWindow = null;
                    cancelAnimationFrame(animationId);
                    pipButton.textContent = '📌 Поверх окон';
                } else {
                    drawStopwatch();
                    pipWindow = await canvas.requestPictureInPicture();
                    pipButton.textContent = '❌ Выйти';
                    
                    pipWindow.addEventListener('resize', () => {
                        drawStopwatch();
                    });
                }
            } catch (error) {
                alert('Picture-in-Picture не поддерживается в этом браузере.\nИспользуйте Chrome, Edge или Safari.');
            }
        }

        pipButton.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePiP();
        });

        canvas.addEventListener('click', (e) => {
            const now = Date.now();
            
            if (now - lastTapTime < 300) {
                clearTimeout(tapTimeout);
                reset();
                lastTapTime = 0;
            } else {
                lastTapTime = now;
                tapTimeout = setTimeout(() => {
                    startStop();
                }, 300);
            }
        });

        document.addEventListener('leavepictureinpicture', () => {
            pipWindow = null;
            cancelAnimationFrame(animationId);
            pipButton.textContent = '📌 Поверх окон';
        });
    </script>
</body>
</html>
